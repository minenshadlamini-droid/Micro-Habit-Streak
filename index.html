<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Habit Streaks</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #1a1d23;
    --accent: #6ee7b7;
    --accent2: #60a5fa;
    --text: #e5e7eb;
    --muted: #9ca3af;
  }
    * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }
 .wrap { width: 100%; max-width: 560px; }
  h1 { font-size: 1.6rem; margin: 0 0 8px; }
  p.sub { color: var(--muted); margin: 0 0 24px; }
 .card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    border: 1px solid #262a33;
  }
 .habit {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid #262a33;
  }
 .habit:last-child { border-bottom: none; }
 .habit-info { display: flex; flex-direction: column; gap: 4px; }
 .habit-name { font-weight: 600; }
 .streak { color: var(--accent); font-size: 0.9rem; }
  button {
    background: var(--accent);
    color: #0f1115;
    border: none;
    padding: 10px 16px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.15s;
  }
  button:active { transform: scale(0.97); }
  button.done { opacity: 0.5; }
  button.secondary { background: var(--accent2); color: #0f1115; }
  input, select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #262a33;
    background: #0f1115;
    color: var(--text);
    margin-top: 8px;
  }
 .add-row,.btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
 .add-row input { flex: 1; margin: 0; }
 .clear {
    background: transparent;
    color: var(--muted);
    border: 1px solid #262a33;
    margin-top: 12px;
  }
 .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    text-align: center;
  }
 .stat { background: #0f1115; padding: 12px; border-radius: 10px; }
 .stat-val { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
 .stat-lab { font-size: 0.85rem; color: var(--muted); }
 .heatmap {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-top: 12px;
  }
 .day {
    aspect-ratio: 1;
    background: #0f1115;
    border-radius: 4px;
  }
 .day.done { background: var(--accent); }
 .share-preview {
    background: linear-gradient(135deg, #1a1d23, #0f1115);
    padding: 24px;
    border-radius: 16px;
    text-align: center;
    margin-top: 12px;
  }
 .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
 .tab {
    flex: 1;
    padding: 10px;
    background: #0f1115;
    border: 1px solid #262a33;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
  }
 .tab.active {
    background: var(--accent);
    color: #0f1115;
    border-color: var(--accent);
  }
 .hidden { display: none; }
</style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4134434877055985"
     crossorigin="anonymous"></script>
</head>
<body>
<div class="wrap">
  <h1>Micro Habit Streaks 🔥</h1>
  <p class="sub">Pick tiny habits. Check them daily. Don’t break the chain.</p>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('habits')">Habits</div>
    <div class="tab" onclick="switchTab('stats')">Stats</div>
    <div class="tab" onclick="switchTab('share')">Share</div>
    <div class="tab" onclick="switchTab('settings')">Settings</div>
  </div>

  <!-- Habits Tab -->
  <div id="tab-habits">
    <div class="card" id="habits"></div>
    <div class="card">
      <strong>Add a habit</strong>
      <div class="add-row">
        <input id="newHabit" placeholder="e.g. 10 pushups, read 2 pages">
        <button onclick="addHabit()">Add</button>
      </div>
    </div>
  </div>

  <!-- Stats Tab -->
  <div id="tab-stats" class="hidden">
    <div class="card">
      <strong>Your Stats</strong>
      <div class="stats-grid" id="statsGrid"></div>
      <div id="heatmap"></div>
    </div>
  </div>

  <!-- Share Tab -->
  <div id="tab-share" class="hidden">
    <div class="card">
      <strong>Share Your Streaks</strong>
      <div class="share-preview" id="sharePreview"></div>
      <div class="btn-row">
        <button onclick="downloadShareCard()">Download Image</button>
        <button class="secondary" onclick="copyShareText()">Copy Text</button>
      </div>
    </div>
  </div>

  <!-- Settings Tab -->
  <div id="tab-settings" class="hidden">
    <div class="card">
      <strong>Daily Reminders</strong>
      <p class="sub">Get a browser notification at the same time daily.</p>
      <input type="time" id="reminderTime">
      <div class="btn-row">
        <button onclick="enableReminders()">Enable Reminders</button>
        <button class="clear" onclick="disableReminders()">Disable</button>
      </div>
      <div id="reminderStatus" style="margin-top: 8px; color: var(--muted); font-size: 0.9rem;"></div>
    </div>
    <div class="card">
      <button class="clear" onclick="resetAll()">Reset all data</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'habit_streaks_v2';
const REMINDER_KEY = 'habit_reminder_time';

function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  return raw? JSON.parse(raw) : [];
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function switchTab(tab) {
  document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.remove('hidden');
  document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');

  if (tab === 'stats') renderStats();
  if (tab === 'share') renderShareCard();
  if (tab === 'settings') updateReminderStatus();
}

function render() {
  const data = loadData();
  const container = document.getElementById('habits');
  if (data.length === 0) {
    container.innerHTML = '<div style="color: var(--muted)">No habits yet. Add one below.</div>';
    return;
  }

  container.innerHTML = data.map((h, i) => {
    const doneToday = h.lastDone === todayStr();
    return `
      <div class="habit">
        <div class="habit-info">
          <div class="habit-name">${h.name}</div>
          <div class="streak">${h.streak} day streak</div>
        </div>
        <button class="${doneToday? 'done' : ''}"
                ${doneToday? 'disabled' : ''}
                onclick="checkHabit(${i})">
          ${doneToday? 'Done' : 'Check'}
        </button>
      </div>
    `;
  }).join('');
}

function checkHabit(index) {
  const data = loadData();
  const habit = data[index];
  if (habit.lastDone === todayStr()) return;

  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yestStr = yesterday.toISOString().split('T')[0];

  habit.streak = (habit.lastDone === yestStr)? habit.streak + 1 : 1;
  habit.lastDone = todayStr();

  // Log for stats
  habit.history = habit.history || [];
  if (!habit.history.includes(todayStr())) habit.history.push(todayStr());

  saveData(data);
  render();
}

function addHabit() {
  const input = document.getElementById('newHabit');
  const name = input.value.trim();
  if (!name) return;
  const data = loadData();
  if (data.length >= 6) {
    alert('Max 6 habits. Keep it simple.');
    return;
  }
  data.push({ name, streak: 0, lastDone: null, history: [] });
  saveData(data);
  input.value = '';
  render();
}

function renderStats() {
  const data = loadData();
  const totalCheckins = data.reduce((sum, h) => sum + h.history.length, 0);
  const longestStreak = Math.max(0,...data.map(h => h.streak));
  const totalPossible = data.length * 30; // last 30 days
  const completionRate = totalPossible > 0? Math.round((totalCheckins / totalPossible) * 100) : 0;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat">
      <div class="stat-val">${totalCheckins}</div>
      <div class="stat-lab">Check-ins</div>
    </div>
    <div class="stat">
      <div class="stat-val">${completionRate}%</div>
      <div class="stat-lab">30-day rate</div>
    </div>
    <div class="stat">
      <div class="stat-val">${longestStreak}</div>
      <div class="stat-lab">Best streak</div>
    </div>
  `;

  // 30 day heatmap
  const days = [];
  for (let i = 29; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().split('T')[0];
    const done = data.some(h => h.history.includes(dateStr));
    days.push(`<div class="day ${done? 'done' : ''}" title="${dateStr}"></div>`);
  }
  document.getElementById('heatmap').innerHTML = `<div class="heatmap">${days.join('')}</div>`;
}

function renderShareCard() {
  const data = loadData();
  if (data.length === 0) {
    document.getElementById('sharePreview').innerHTML = '<div style="color: var(--muted)">Add habits first</div>';
    return;
  }

  const streakText = data.map(h => `${h.name}: ${h.streak} days`).join('<br>');
  document.getElementById('sharePreview').innerHTML = `
    <div style="font-size: 1.2rem; font-weight: 700; margin-bottom: 12px;">My Habit Streaks 🔥</div>
    <div style="color: var(--accent); font-size: 1rem;">${streakText}</div>
    <div style="color: var(--muted); font-size: 0.8rem; margin-top: 12px;">Built with Micro Habit Streaks</div>
  `;
}

function downloadShareCard() {
  const card = document.getElementById('sharePreview');
  // Use canvas to render text to image
  const canvas = document.createElement('canvas');
  canvas.width = 600;
  canvas.height = 400;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#1a1d23';
  ctx.fillRect(0, 0, 600, 400);

  // Text
  ctx.fillStyle = '#e5e7eb';
  ctx.font = 'bold 32px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('My Habit Streaks 🔥', 300, 80);

  const data = loadData();
  ctx.font = '24px system-ui';
  ctx.fillStyle = '#6ee7b7';
  data.forEach((h, i) => {
    ctx.fillText(`${h.name}: ${h.streak} days`, 300, 150 + i * 40);
  });

  ctx.font = '16px system-ui';
  ctx.fillStyle = '#9ca3af';
  ctx.fillText('Built with Micro Habit Streaks', 300, 360);

  const link = document.createElement('a');
  link.download = 'my-streaks.png';
  link.href = canvas.toDataURL();
  link.click();
}

function copyShareText() {
  const data = loadData();
  const text = `My Habit Streaks 🔥\n${data.map(h => `${h.name}: ${h.streak} days`).join('\n')}\n\nBuilt with Micro Habit Streaks`;
  navigator.clipboard.writeText(text);
  alert('Copied to clipboard!');
}

// Reminders
async function enableReminders() {
  if (!('Notification' in window)) {
    alert('Notifications not supported on this browser');
    return;
  }

  const permission = await Notification.requestPermission();
  if (permission!== 'granted') {
    alert('Permission denied');
    return;
  }

  const time = document.getElementById('reminderTime').value;
  if (!time) {
    alert('Pick a time first');
    return;
  }

  localStorage.setItem(REMINDER_KEY, time);
  scheduleReminder();
  updateReminderStatus();
}

function disableReminders() {
  localStorage.removeItem(REMINDER_KEY);
  updateReminderStatus();
}

function scheduleReminder() {
  const time = localStorage.getItem(REMINDER_KEY);
  if (!time) return;

  const [hour, minute] = time.split(':').map(Number);
  const now = new Date();
  const reminderTime = new Date();
  reminderTime.setHours(hour, minute, 0, 0);

  if (reminderTime <= now) reminderTime.setDate(reminderTime.getDate() + 1);

  const delay = reminderTime.getTime() - now.getTime();

  setTimeout(() => {
    new Notification('Habit Check-in Time 🔥', {
      body: 'Don’t break the chain. Check your habits now!',
      icon: '/favicon.ico'
    });
    scheduleReminder(); // reschedule for next day
  }, delay);
}

function updateReminderStatus() {
  const time = localStorage.getItem(REMINDER_KEY);
  document.getElementById('reminderStatus').textContent =
    time? `Reminders set for ${time} daily` : 'No reminders set';
  if (time) document.getElementById('reminderTime').value = time;
}

function resetAll() {
  if (confirm('Delete all habits and streaks?')) {
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(REMINDER_KEY);
    render();
    renderStats();
  }
}

// Init
render();
updateReminderStatus();
if (localStorage.getItem(REMINDER_KEY)) scheduleReminder();
</script>
</body>
</html>
